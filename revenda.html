<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="img/revenda.jpg">
    <link rel="stylesheet" href="css/styles.css">
    <title>Revenda Avenida</title>
</head>
<body>
    <div>
        <img src="img/revenda.jpg" alt="Veículo">
        <h1>Revenda Avenida</h1>
        <form>
            <p>Modelo do Veículo: 
                <input type="text" id="inModelo" required autofocus>
            </p>
            <p>Ano de Fabricação: 
                <input type="number" id="inAno" required>
            </p>
            <p>Preço R$: 
                <input type="number" id="inPreco" min="0" step="0.01" required>
            </p>
            <input type="submit" value="Classificar - Calcular Entrada e Parcelas">
        </form>
        <h3 id="outResp1"></h3>
        <h3 id="outResp2"></h3>
        <h3 id="outResp3"></h3>
    </div>
    <script src="revenda.js"></script>
</body>
</html>
