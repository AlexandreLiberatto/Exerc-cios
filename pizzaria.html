<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="img/pizzaria.jpg">
    <link rel="stylesheet" href="styles.css">
    <title>Programa Pizzaria</title>
</head>
<body>
    <div>
        <img src="img/pizzaria.jpg" alt="Pizza">
        <h1>Programa Pizzaria</h1>
        <form>
            <p>Item do Pedido:
                <input type="radio" name="produto" id="rbPizza" checked autofocus>Pizzaria
                <input type="radio" name="produto" id="rbBebida">Bebida 
            <span>Item:</span>
            <select id="inPizza">
                <option value="media">Pizza Média</option>
                <option value="grande">Pizza Grande</option>
                <option value="familia">Pizza Família</option>
            </select>
            <select id="inBebida" class="oculta">
                <option value="refri">Refrigerante Litro</option>
                <option value="suco">Jarra de Suco</option>
                <option value="agua">Água Mineral</option>
            </select>
            </p>
            <p>Detalhe do Item: 
                <input type="text" id="inDetalhes" class="detalhes">
                <input type="submit" value="Adicionar">
            </p>
        </form>
        <pre></pre>
    </div>
    <script src="pizzaria.js"></script>
</body>
</html>
